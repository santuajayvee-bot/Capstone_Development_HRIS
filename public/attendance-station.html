<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LGSV HR Attendance Station</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0f1117;
      --panel:#1d2030;
      --panel-2:#111827;
      --border:#2d3754;
      --text:#f8fbff;
      --muted:#aab7df;
      --blue:#4f7cff;
      --green:#22d3a5;
      --yellow:#f5a623;
      --red:#e05c7a;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      font-family:Poppins, Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .station {
      width:min(920px, 100%);
      border:1px solid var(--border);
      border-radius:14px;
      background:var(--panel);
      overflow:hidden;
    }
    .station-header {
      padding:24px;
      border-bottom:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
    }
    h1 { margin:0; font-size:24px; font-weight:600; }
    p { margin:6px 0 0; color:var(--muted); font-size:13px; }
    .status-pill {
      display:inline-flex;
      align-items:center;
      min-height:34px;
      padding:7px 12px;
      border-radius:999px;
      border:1px solid rgba(245,166,35,.35);
      color:#fde68a;
      background:rgba(245,166,35,.12);
      font-size:13px;
    }
    .status-pill.ok { color:#bbf7d0; border-color:rgba(34,211,165,.35); background:rgba(34,211,165,.13); }
    .status-pill.bad { color:#fecaca; border-color:rgba(224,92,122,.4); background:rgba(224,92,122,.13); }
    .station-body { padding:24px; }
    .prompt {
      padding:22px;
      border:1px solid var(--border);
      border-radius:10px;
      background:var(--panel-2);
      text-align:center;
    }
    .prompt-title { font-size:22px; font-weight:600; margin-bottom:6px; }
    .scan-button {
      margin-top:18px;
      min-height:48px;
      padding:0 28px;
      border:0;
      border-radius:8px;
      background:var(--blue);
      color:#fff;
      font:600 14px Poppins, Arial, sans-serif;
      cursor:pointer;
    }
    .scan-button:disabled { opacity:.55; cursor:not-allowed; }
    .result-grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
      margin-top:18px;
    }
    .result-item {
      padding:14px;
      border:1px solid var(--border);
      border-radius:8px;
      background:rgba(11,18,32,.55);
    }
    .result-item label {
      display:block;
      margin-bottom:6px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:.04em;
      text-transform:uppercase;
    }
    .result-item div { min-height:22px; font-size:15px; color:var(--text); }
    .result-message {
      margin-top:18px;
      padding:14px;
      border-radius:8px;
      border:1px solid var(--border);
      color:var(--muted);
      background:rgba(11,18,32,.55);
    }
    .result-message.ok { color:#bbf7d0; border-color:rgba(34,211,165,.35); background:rgba(34,211,165,.12); }
    .result-message.bad { color:#fecaca; border-color:rgba(224,92,122,.4); background:rgba(224,92,122,.12); }
    @media (max-width: 640px) {
      body { padding:12px; align-items:flex-start; }
      .station-header, .station-body { padding:18px; }
      .result-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="station">
    <header class="station-header">
      <div>
        <h1>Attendance Station</h1>
        <p>Scan fingerprint to record attendance. Login is not required.</p>
      </div>
      <div id="scanner-status" class="status-pill">Checking scanner</div>
    </header>

    <section class="station-body">
      <div class="prompt">
        <div class="prompt-title" id="prompt-title">Place finger on scanner</div>
        <p id="prompt-copy">The system will identify the employee and record the correct attendance punch.</p>
        <button class="scan-button" id="scan-button" onclick="scanFingerprint()">Scan Fingerprint</button>
      </div>

      <div class="result-grid">
        <div class="result-item"><label>Employee Name</label><div id="employee-name">-</div></div>
        <div class="result-item"><label>Employee Number</label><div id="employee-code">-</div></div>
        <div class="result-item"><label>Time In / Time Out</label><div id="attendance-type">-</div></div>
        <div class="result-item"><label>Scan Time</label><div id="scan-time">-</div></div>
      </div>

      <div class="result-message" id="attendance-result">Waiting for fingerprint scan.</div>
    </section>
  </main>

  <script>
    const bridgeUrl = window.BIOMETRIC_BRIDGE_URL || 'http://localhost:8787';

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) element.textContent = value || '-';
    }

    function setStatus(text, state) {
      const status = document.getElementById('scanner-status');
      status.textContent = text;
      status.className = `status-pill ${state || ''}`.trim();
    }

    function setResult(text, state) {
      const result = document.getElementById('attendance-result');
      result.textContent = text;
      result.className = `result-message ${state || ''}`.trim();
    }

    function parseHrisResponse(scanResponse) {
      if (!scanResponse || !scanResponse.hris_response) return scanResponse;
      if (typeof scanResponse.hris_response === 'string') {
        try { return JSON.parse(scanResponse.hris_response); } catch (_) { return scanResponse; }
      }
      return scanResponse.hris_response;
    }

    async function loadStationStatus() {
      try {
        const [bridge, hris] = await Promise.all([
          fetch(`${bridgeUrl}/health`),
          fetch('/api/biometric/station-status')
        ]);
        const bridgeData = await bridge.json();
        const hrisData = await hris.json();
        const device = hrisData.device;
        if (!bridge.ok || !bridgeData.ok || !device || !device.is_active) {
          setStatus('Disconnected', 'bad');
          return;
        }
        setStatus(`Connected - ${device.device_name || 'Fingerprint Scanner'}`, 'ok');
      } catch (err) {
        setStatus('Disconnected', 'bad');
      }
    }

    async function scanFingerprint() {
      const button = document.getElementById('scan-button');
      button.disabled = true;
      setText('prompt-title', 'Scanning...');
      setResult('Place finger firmly on the ZK9500 scanner.', '');

      try {
        const response = await fetch(`${bridgeUrl}/scan`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            scan_type: 'AUTO',
            hris_api_url: `${window.location.origin}/api/biometric/station-attendance`
          })
        });
        const bridgeData = await response.json();
        if (!response.ok) throw new Error(bridgeData.error || 'Fingerprint scan failed.');

        const data = parseHrisResponse(bridgeData);
        setText('employee-name', data.employee?.name || bridgeData.employee_name || '');
        setText('employee-code', data.employee?.employee_code || bridgeData.employee_code || '');
        setText('attendance-type', (data.action || '-').replace('_', ' '));
        setText('scan-time', data.scan_time ? new Date(data.scan_time).toLocaleString('en-PH') : new Date().toLocaleString('en-PH'));
        setResult(data.message || 'Attendance recorded.', 'ok');
        setText('prompt-title', 'Attendance recorded');
      } catch (err) {
        setResult(err.message, 'bad');
        setText('prompt-title', 'Scan not recorded');
      } finally {
        button.disabled = false;
        await loadStationStatus();
      }
    }

    loadStationStatus();
    setInterval(loadStationStatus, 15000);
  </script>
</body>
</html>
