<div class="page-section">
  <div class="page-header">
    <div>
      <div class="section-title">201-File Management</div>
      <div class="section-sub">HR Admin can manage employee 201-files, documents, and sensitive information.</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div class="page-header-right" style="margin-bottom:12px;">
      <input id="201file-search" type="text" placeholder="Search employee..." class="search-input" oninput="filter201FileList()" />
    </div>
    <div id="201file-list" class="table-wrap" style="max-height:300px;overflow:auto;"></div>
  </div>

  <div id="201file-detail" class="card" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3 id="201file-detail-title">201-File Details</h3>
      <button class="btn btn-outline" onclick="close201FileDetail()">Close</button>
    </div>

    <div id="employee-info" style="margin-top:14px;"></div>

    <div id="document-section" style="margin-top:20px;">
      <h4>Documents</h4>
      <form id="201file-upload-form" onsubmit="return upload201Document()" style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <select id="upload-document-type" class="form-select" required>
          <option value="">Select document type</option>
          <option value="Resume">Resume</option>
          <option value="Government_ID">Government ID</option>
          <option value="NBI_Clearance">NBI Clearance</option>
          <option value="Contract">Contract</option>
          <option value="Other">Other</option>
        </select>
        <input type="file" id="upload-document-file" class="file-input" required />
        <button class="btn btn-primary" type="submit">Upload</button>
      </form>
      <div id="document-list" class="table-wrap" style="min-height:100px;"></div>
    </div>

    <div id="sensitive-data-section" style="margin-top:20px;">
      <h4 style="margin-bottom:16px;">🔒 Sensitive Data</h4>
      <form id="sensitive-data-form" onsubmit="return updateSensitiveData()" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;background:rgba(255,255,255,0.02);padding:16px;border-radius:8px;border:1px solid var(--border);">
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500;color:var(--text2);">
          <span>SSN / TIN</span>
          <input id="sd-ssn" type="text" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);font-size:13px;" />
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500;color:var(--text2);">
          <span>Tax ID</span>
          <input id="sd-taxid" type="text" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);font-size:13px;" />
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500;color:var(--text2);">
          <span>Bank Account Number</span>
          <input id="sd-bank-account" type="text" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);font-size:13px;" />
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500;color:var(--text2);">
          <span>Bank Routing Number</span>
          <input id="sd-bank-routing" type="text" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);font-size:13px;" />
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500;color:var(--text2);grid-column:1 / -1;">
          <span>Emergency Contact Phone</span>
          <input id="sd-emergency" type="text" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);font-size:13px;" />
        </label>
        <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:500;color:var(--text2);grid-column:1 / -1;">
          <span>Additional Information</span>
          <textarea id="sd-other" rows="3" style="padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);font-size:13px;font-family:inherit;resize:vertical;"></textarea>
        </label>
        <div style="grid-column:1 / -1;display:flex;justify-content:space-between;align-items:center;gap:12px;">
          <div id="sensitive-data-result" style="height:20px;font-size:13px;color:var(--green);font-weight:500;"></div>
          <button class="btn btn-primary" type="submit" style="padding:8px 18px;font-size:13px;font-weight:600;">💾 Save Sensitive Data</button>
        </div>
      </form>
    </div>

    <div id="access-log-section" style="margin-top:20px;">
      <h4>201-File Access Log (latest 100)</h4>
      <div id="access-log-list" class="access-log" style="max-height:240px;overflow:auto;border:1px solid var(--border);border-radius:10px;padding:10px;background:var(--card2);"></div>
    </div>
  </div>
</div>
