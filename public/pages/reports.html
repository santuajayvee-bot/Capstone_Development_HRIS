<div class="page-header">
  <div>
    <div class="section-title">Reports</div>
    <div class="section-sub">Generate HR, attendance, leave, payroll, production, logistics, audit, and blockchain reports.</div>
  </div>
</div>

<div class="table-wrap report-library-panel">
  <div class="report-filter-grid">
    <div class="form-group">
      <label for="report-search">Search Reports</label>
      <input id="report-search" class="search-input" type="search" placeholder="Report name or description">
    </div>
    <div class="form-group">
      <label for="report-category">Category</label>
      <select id="report-category" class="filter-select">
        <option value="all">All</option>
      </select>
    </div>
    <div class="form-group">
      <label for="report-payroll-period">Payroll Period</label>
      <select id="report-payroll-period" class="filter-select">
        <option value="all">All periods</option>
      </select>
    </div>
    <div class="form-group">
      <label for="report-department">Department</label>
      <select id="report-department" class="filter-select">
        <option value="all">All</option>
      </select>
    </div>
    <div class="form-group">
      <label for="report-wage-type">Wage Type</label>
      <select id="report-wage-type" class="filter-select">
        <option value="all">All</option>
      </select>
    </div>
    <div class="form-group">
      <label for="report-employee">Employee</label>
      <select id="report-employee" class="filter-select">
        <option value="all">All employees</option>
      </select>
    </div>
    <div class="form-group">
      <label for="report-date-from">Date From</label>
      <input id="report-date-from" class="search-input" type="date">
    </div>
    <div class="form-group">
      <label for="report-date-to">Date To</label>
      <input id="report-date-to" class="search-input" type="date">
    </div>
    <div class="form-group">
      <label for="report-status">Status</label>
      <select id="report-status" class="filter-select">
        <option value="all">All</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
        <option value="Validated">Validated</option>
        <option value="Payroll Ready">Payroll Ready</option>
      </select>
    </div>
    <div class="report-filter-actions">
      <button id="report-search-btn" class="btn btn-primary" type="button">Search</button>
      <button id="report-reset-btn" class="btn btn-outline" type="button">Reset Filters</button>
    </div>
  </div>
</div>

<div class="table-wrap report-library-panel">
  <div class="table-toolbar">
    <div>
      <h3>Report Library</h3>
      <p id="report-library-count">Loading reports...</p>
    </div>
  </div>
  <div class="responsive-table">
    <table class="responsive-scroll-table report-library-table">
      <thead>
        <tr>
          <th style="width:64px;">Favorite</th>
          <th>Report Name</th>
          <th>Category</th>
          <th>Description</th>
          <th>Export Formats</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="report-library-body">
        <tr>
          <td colspan="6">Loading reports...</td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="pagination-row">
    <button id="report-prev-page" class="btn btn-outline btn-sm" type="button">Previous</button>
    <span id="report-page-label">Page 1</span>
    <button id="report-next-page" class="btn btn-outline btn-sm" type="button">Next</button>
  </div>
</div>

<div class="modal fade" id="reportGenerateModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="reportGenerateTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="reportGenerateTitle">Generate Report</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="reportGenerateDescription" class="section-sub"></p>
        <div class="form-group">
          <label for="report-export-format">Export Format</label>
          <select id="report-export-format" class="filter-select"></select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="report-generate-confirm">Generate Report</button>
      </div>
    </div>
  </div>
</div>
