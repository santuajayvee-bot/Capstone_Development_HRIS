<div class="page-header">
  <div>
    <div class="section-title">Reports</div>
    <div class="section-sub">Generate reports, preview Attendance DTR, and finalize verified DTR hashes for blockchain anchoring.</div>
  </div>
</div>

<div class="table-wrap report-output-panel">
  <div class="report-filter-grid">
    <div class="form-group">
      <label for="report-date-from">Date From</label>
      <input id="report-date-from" class="search-input" type="date">
    </div>
    <div class="form-group">
      <label for="report-date-to">Date To</label>
      <input id="report-date-to" class="search-input" type="date">
    </div>
    <div class="form-group">
      <label for="report-payroll-period">Payroll Period</label>
      <select id="report-payroll-period" class="filter-select">
        <option value="all">All periods</option>
      </select>
    </div>
    <div class="report-filter-actions">
      <button id="report-reset-btn" class="btn btn-outline" type="button">Reset Filters</button>
    </div>
  </div>
</div>

<div class="table-wrap report-output-panel">
  <div class="table-toolbar">
    <div>
      <h3>Available Outputs</h3>
      <p id="report-library-count">3 outputs available. Payslips require one employee and one payroll period.</p>
    </div>
  </div>
  <div class="responsive-table">
    <table class="responsive-scroll-table report-library-table" data-no-pagination="1">
      <thead>
        <tr>
          <th>Output</th>
          <th>Description</th>
          <th>Format</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="report-library-body">
        <tr>
          <td colspan="4">Loading outputs...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
