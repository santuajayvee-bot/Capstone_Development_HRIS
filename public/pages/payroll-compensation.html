<!-- ============================================================
     pages/payroll-compensation.html — Payroll & Compensation Setup
     ============================================================ -->
<div class="page-header">
  <div>
    <div class="section-title">💼 Payroll & Compensation</div>
    <div class="section-sub">Configure employee wage types and compensation rates</div>
  </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 24px;">
  
  <!-- LEFT: Employee Selection -->
  <div style="background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; height: fit-content;">
    <h4 style="margin: 0 0 16px 0; font-weight: 600; font-size: 13px; text-transform: uppercase; color: var(--muted);">👤 Select Employee</h4>
    
    <select id="comp-employee-select" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); background: var(--bg); margin-bottom: 16px; cursor: pointer;">
      <option value="">— Choose an employee —</option>
    </select>
    
    <div id="comp-employee-info" style="display: none; background: var(--bg); border-radius: 8px; padding: 12px; border-left: 3px solid var(--accent);">
      <div style="font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; font-weight: 600;">📋 Current Setup</div>
      <div id="comp-current-wage" style="font-weight: 600; color: var(--text); margin-bottom: 8px;">—</div>
      <div id="comp-current-rate" style="font-size: 13px; color: var(--accent); font-weight: 600;">—</div>
    </div>
  </div>
  
  <!-- RIGHT: Wage Configuration -->
  <div style="background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; display: flex; flex-direction: column;">
    <h4 style="margin: 0 0 16px 0; font-weight: 600; font-size: 13px; text-transform: uppercase; color: var(--muted);">⚙️ Wage Configuration</h4>
    
    <!-- Wage Type Selection -->
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">💰 Wage Type</label>
      <select id="comp-wage-type" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); background: var(--bg); cursor: pointer;">
        <option value="">— Select wage type —</option>
      </select>
    </div>

    <!-- Base Salary Section -->
    <div id="comp-base-section" style="display: none; margin-bottom: 20px; padding: 16px; background: var(--bg); border-radius: 6px; border-left: 3px solid #4f7cff;">
      <label style="display: block; font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; font-weight: 600;">Monthly Base Salary</label>
      <input id="comp-base-salary" type="number" min="0" step="0.01" placeholder="25000.00" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); background: white;" />
    </div>

    <!-- Hourly Section -->
    <div id="comp-hourly-section" style="display: none; margin-bottom: 20px; padding: 16px; background: var(--bg); border-radius: 6px; border-left: 3px solid #4f7cff;">
      <label style="display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Hourly Rate (₱)</label>
      <input id="comp-hourly-rate" type="number" min="0" step="0.01" placeholder="250.00" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); background: white; margin-bottom: 12px;" />
      
      <label style="display: block; font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; font-weight: 600;">Overtime Rate (₱/hour)</label>
      <input id="comp-overtime-rate" type="number" min="0" step="0.01" placeholder="375.00" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; color: var(--text); background: white;" />
    </div>

    <!-- Sewing Type Rates (for Per-Piece) -->
    <div id="comp-sewing-section" style="display: none; margin-bottom: 20px;">
      <label style="display: block; font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; font-weight: 600;">🧵 Sewing Type Rates</label>
      <div id="comp-sewing-items" style="display: grid; gap: 12px;"></div>
    </div>

    <!-- Logistics Region Rates (for Per-Trip) -->
    <div id="comp-logistics-section" style="display: none; margin-bottom: 20px;">
      <label style="display: block; font-size: 11px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; font-weight: 600;">📍 Logistics Region Rates</label>
      <div id="comp-logistics-items" style="display: grid; gap: 12px;"></div>
    </div>

    <!-- Status Message -->
    <div id="comp-status-msg" style="display: none; margin-bottom: 16px; padding: 12px; border-radius: 6px; font-size: 13px; font-weight: 600;"></div>

    <!-- Save Button -->
    <button id="comp-save-btn" onclick="saveCompensation()" style="width: 100%; padding: 12px; background: #4f7cff; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: auto; transition: all 0.2s ease;">
      ✓ Save Compensation
    </button>
  </div>
</div>
