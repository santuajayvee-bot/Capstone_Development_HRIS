<!-- ============================================================
     pages/dashboard.html - Role-aware dynamic dashboard
     ============================================================ -->

<section class="dashboard-shell" id="dashboard-root">
  <div class="dashboard-header">
    <div>
      <div class="section-title" id="dashboard-title">System Overview</div>
      <div class="section-sub" id="dashboard-subtitle">Current HRIS record counts.</div>
    </div>
    <span class="dashboard-role-badge" id="dashboard-role">Role</span>
  </div>

  <section class="dashboard-summary" aria-labelledby="dashboard-summary-title">
    <div class="dashboard-section-title" id="dashboard-summary-title">Record Summary</div>
    <div class="dashboard-count-grid" id="dashboard-stats"></div>
  </section>

  <div class="dashboard-grid">
    <div class="dashboard-main" id="dashboard-main"></div>
    <aside class="dashboard-side">
      <section class="card dashboard-panel">
        <div class="dashboard-panel-title">Quick Actions</div>
        <div class="dashboard-actions" id="dashboard-actions"></div>
      </section>

      <section class="card dashboard-panel">
        <div class="dashboard-panel-title">Notifications</div>
        <div class="dashboard-list" id="dashboard-notifications"></div>
      </section>
    </aside>
  </div>
</section>
