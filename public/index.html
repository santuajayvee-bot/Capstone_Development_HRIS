<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LGSV_HR System</title>

  <!-- CSS Modules -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/employees.css" />
  <link rel="stylesheet" href="css/leave.css" />
  <link rel="stylesheet" href="css/attendance.css" />
  <link rel="stylesheet" href="css/blockchain.css" />
  <link rel="stylesheet" href="css/recruitment.css" />
  <link rel="stylesheet" href="css/system-admin.css?v=2" />
  <link rel="stylesheet" href="css/employee-dashboard.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon" style="width:64px;height:64px;font-size:22px;margin:0 auto 8px;">LG</div>
      <div class="login-brand">LGSV_HR</div>
    </div>
    <div class="login-welcome">Welcome, User!</div>
    <div class="login-field">
      <input type="text" id="username" placeholder="Username" autocomplete="username" />
    </div>
    <div class="login-field">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
    </div>
    <button class="btn-login" onclick="doLogin()">Login</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon" style="width:36px;height:36px;font-size:12px;border-radius:8px;">LG</div>
        <span>LGSV_HR</span>
      </div>

      <!-- Nav items injected by auth.js buildSidebar() -->
      <div class="nav-items" id="nav-items"></div>

      <div class="sidebar-user">
        <div class="user-avatar">AD</div>
        <div class="sidebar-user-info">
          <div class="name" id="sidebar-user-name">—</div>
          <span id="role-badge" class="role-badge" style="display:none;"></span>
        </div>
        <button class="btn-logout" id="btn-logout" title="Logout">⎋</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-date">Friday, February 27, 2026</div>
      </div>

      <div class="page-body">

        <!-- Dashboard -->
        <div class="page active" id="page-dashboard">
          <div data-include="pages/dashboard.html"></div>
        </div>

        <!-- Employees — admin only -->
        <div class="page" id="page-employees">
          <div data-include="pages/employees.html"></div>
        </div>

        <div class="page" id="page-register">
          <div data-include="pages/register.html"></div>
        </div>

        <div class="page" id="page-employee-profile">
          <div data-include="pages/employee-profile.html"></div>
        </div>

        <!-- 201-File Management — HR Admin only -->
        <div class="page" id="page-201file">
          <div data-include="pages/201file.html"></div>
        </div>

        <!-- Leave Management — all roles -->
        <div class="page" id="page-leave">
          <div data-include="pages/leave.html"></div>
        </div>

        <!-- Requests — all roles -->
        <div class="page" id="page-requests">
          <div data-include="pages/requests.html"></div>
        </div>

        <!-- Attendance — all roles -->
        <div class="page" id="page-attendance">
          <div data-include="pages/attendance.html"></div>
        </div>

        <!-- Payroll — payroll roles + admin only -->
        <div class="page" id="page-payroll">
          <div data-include="pages/payroll.html"></div>
        </div>

        <!-- Reports — payroll roles + admin only -->
        <div class="page" id="page-reports">
          <div data-include="pages/reports.html"></div>
        </div>

        <!-- On-Boarding — admin only -->
        <div class="page" id="page-onboarding">
          <div data-include="pages/recruitment.html"></div>
        </div>

        <!-- Blockchain — admin only -->
        <div class="page" id="page-blockchain">
          <div data-include="pages/blockchain.html"></div>
        </div>

        <!-- System Administration — Level 4 only -->
        <div class="page" id="page-system-admin">
          <div data-include="pages/system-admin.html"></div>
        </div>

        <!-- Employee Dashboard — Employee role only -->
        <div class="page" id="page-employee-dashboard">
          <div data-include="pages/employee-dashboard.html"></div>
        </div>

        <!-- Access Denied -->
        <div class="page" id="page-denied">
          <div class="denied-icon">⛔</div>
          <div class="denied-title">Access Denied</div>
          <div class="denied-sub">You don't have permission to view this page. Contact your administrator if you think this is a mistake.</div>
          <button class="denied-back" onclick="navigate('dashboard', document.querySelector('.nav-item'))">← Back to Dashboard</button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Universal Modal for Alerts and Confirms -->
<style>
  .modal-backdrop-custom {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(15, 23, 42, .66);
    backdrop-filter: blur(3px);
  }

  .modal-dialog-custom {
    width: min(440px, 100%);
    background: #fff;
    color: #111827;
    border-radius: 8px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, .32);
    overflow: hidden;
  }

  .modal-header-custom {
    display: flex;
    gap: 12px;
    align-items: center;
    padding: 18px 20px;
    border-bottom: 1px solid #e5e7eb;
  }

  .modal-icon-custom {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    font-size: 16px;
    font-weight: 800;
  }

  .modal-title-custom {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    color: #111827;
  }

  .modal-body-custom {
    padding: 18px 20px 6px;
  }

  .modal-body-custom p {
    margin: 0;
    color: #4b5563;
    font-size: 14px;
    line-height: 1.55;
  }

  .modal-footer-custom {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 16px 20px 20px;
  }

  .btn-modal {
    min-width: 88px;
    min-height: 36px;
    padding: 8px 14px;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
  }

  .btn-modal-primary { background: #2563eb; color: #fff; }
  .btn-modal-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
  .btn-modal-danger { background: #dc3545; color: #fff; }
  .btn-modal-success { background: #198754; color: #fff; }
  .btn-modal-warning { background: #f59e0b; color: #111827; }

  .modal-icon-info { background: #dbeafe; color: #1d4ed8; }
  .modal-icon-success { background: #dcfce7; color: #15803d; }
  .modal-icon-warning { background: #fef3c7; color: #b45309; }
  .modal-icon-error { background: #fee2e2; color: #b91c1c; }
</style>
<div id="universal-modal" class="modal-backdrop-custom" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal-dialog-custom">
    <div class="modal-header-custom">
      <div id="modal-icon" class="modal-icon-custom modal-icon-info">i</div>
      <h3 id="modal-title" class="modal-title-custom">Alert</h3>
    </div>
    <div class="modal-body-custom">
      <p id="modal-message">Message</p>
    </div>
    <div id="modal-buttons" class="modal-footer-custom">
      <button id="modal-cancel" class="btn-modal btn-modal-secondary" style="display:none;">Cancel</button>
      <button id="modal-confirm" class="btn-modal btn-modal-primary">OK</button>
    </div>
  </div>
</div>

<!-- JS Modules (order matters: auth first, then others) -->
<script src="js/modal-utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/register.js"></script>
<script src="js/employees.js"></script>
<script src="js/leave.js"></script>
<script src="js/201file.js"></script>
<script src="js/attendance.js"></script>
<script src="js/payroll.js"></script>
<script src="js/salary-calculation.js"></script>
<script src="js/reports.js"></script>
<script src="js/blockchain.js"></script>
<script src="js/recruitment.js"></script>
<script src="js/system-admin.js?v=2"></script>
<script src="js/employee-dashboard.js"></script>

<!-- Page partial loader -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const includes = document.querySelectorAll('[data-include]');
    await Promise.all([...includes].map(async el => {
      try {
        const res = await fetch(el.getAttribute('data-include'));
        el.innerHTML = await res.text();
      } catch (err) {
        console.warn('Could not load partial:', el.getAttribute('data-include'));
      }
    }));

    document.dispatchEvent(new CustomEvent('partialsLoaded'));
  });
</script>

</body>
</html>
