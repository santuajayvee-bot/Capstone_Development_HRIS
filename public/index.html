<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LGSV_HR System</title>

  <!-- CSS Modules -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/employees.css" />
  <link rel="stylesheet" href="css/leave.css" />
  <link rel="stylesheet" href="css/attendance.css" />
  <link rel="stylesheet" href="css/blockchain.css" />
  <link rel="stylesheet" href="css/recruitment.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon" style="width:64px;height:64px;font-size:22px;margin:0 auto 8px;">LG</div>
      <div class="login-brand">LGSV_HR</div>
    </div>
    <div class="login-welcome">Welcome, User!</div>
    <div class="login-field">
      <input type="text" id="username" placeholder="Username" autocomplete="username" />
    </div>
    <div class="login-field">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
    </div>
    <button class="btn-login" onclick="doLogin()">Login</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon" style="width:36px;height:36px;font-size:12px;border-radius:8px;">LG</div>
        <span>LGSV_HR</span>
      </div>

      <!-- Nav items injected by auth.js buildSidebar() -->
      <div class="nav-items" id="nav-items"></div>

      <div class="sidebar-user">
        <div class="user-avatar">AD</div>
        <div class="sidebar-user-info">
          <div class="name" id="sidebar-user-name">—</div>
          <span id="role-badge" class="role-badge" style="display:none;"></span>
        </div>
        <button class="btn-logout" id="btn-logout" title="Logout">⎋</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="topbar">
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-date">Friday, February 27, 2026</div>
      </div>

      <div class="page-body">

        <!-- Dashboard -->
        <div class="page active" id="page-dashboard">
          <div data-include="pages/dashboard.html"></div>
        </div>

        <!-- Employees — admin only -->
        <div class="page" id="page-employees">
          <div data-include="pages/employees.html"></div>
        </div>

        <!-- 201-File Management — HR Admin only -->
        <div class="page" id="page-201file">
          <div data-include="pages/201file.html"></div>
        </div>

        <!-- Leave Management — all roles -->
        <div class="page" id="page-leave">
          <div data-include="pages/leave.html"></div>
        </div>

        <!-- Requests — all roles -->
        <div class="page" id="page-requests">
          <div data-include="pages/requests.html"></div>
        </div>

        <!-- Attendance — all roles -->
        <div class="page" id="page-attendance">
          <div data-include="pages/attendance.html"></div>
        </div>

        <!-- Payroll — payroll roles + admin only -->
        <div class="page" id="page-payroll">
          <div data-include="pages/payroll.html"></div>
        </div>

        <!-- Salary Calculation — payroll roles + admin only -->
        <div class="page" id="page-salary-calculation">
          <div data-include="pages/salary-calculation.html"></div>
        </div>

        <!-- On-Boarding — admin only -->
        <div class="page" id="page-onboarding">
          <div data-include="pages/recruitment.html"></div>
        </div>

        <!-- Blockchain — admin only -->
        <div class="page" id="page-blockchain">
          <div data-include="pages/blockchain.html"></div>
        </div>

        <!-- Access Denied -->
        <div class="page" id="page-denied">
          <div class="denied-icon">⛔</div>
          <div class="denied-title">Access Denied</div>
          <div class="denied-sub">You don't have permission to view this page. Contact your administrator if you think this is a mistake.</div>
          <button class="denied-back" onclick="navigate('dashboard', document.querySelector('.nav-item'))">← Back to Dashboard</button>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Universal Modal for Alerts and Confirms -->
<div id="universal-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div style="background:white;border-radius:12px;max-width:450px;width:90%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div id="modal-icon" style="font-size:48px;margin-bottom:16px;">ℹ️</div>
    <h3 id="modal-title" style="margin:0 0 12px 0;font-size:18px;font-weight:600;color:#333;">Alert</h3>
    <p id="modal-message" style="margin:0 0 24px 0;font-size:14px;color:#666;line-height:1.5;">Message</p>
    <div id="modal-buttons" style="display:flex;gap:12px;justify-content:flex-end;">
      <button id="modal-cancel" style="flex:1;padding:10px;background:#f0f0f0;color:#333;border:none;border-radius:6px;font-weight:600;cursor:pointer;display:none;">Cancel</button>
      <button id="modal-confirm" style="flex:1;padding:10px;background:#4f7cff;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;">OK</button>
    </div>
  </div>
</div>

<!-- JS Modules (order matters: auth first, then others) -->
<script src="js/modal-utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/login.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/employees.js"></script>
<script src="js/leave.js"></script>
<script src="js/201file.js"></script>
<script src="js/attendance.js"></script>
<script src="js/payroll.js"></script>
<script src="js/salary-calculation.js"></script>
<script src="js/blockchain.js"></script>
<script src="js/recruitment.js"></script>

<!-- Page partial loader -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const includes = document.querySelectorAll('[data-include]');
    await Promise.all([...includes].map(async el => {
      try {
        const res = await fetch(el.getAttribute('data-include'));
        el.innerHTML = await res.text();
      } catch (err) {
        console.warn('Could not load partial:', el.getAttribute('data-include'));
      }
    }));
  });
</script>

</body>
</html>
